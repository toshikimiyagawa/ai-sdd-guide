# SDD enforcement — the authoritative, non-bypassable gate (all agents).
# Copy to .github/workflows/ and replace the test command for this project.
name: SDD Check
on:
  pull_request:

jobs:
  sdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: State reset gate
        run: |
          if [ ! -f ".sdd/state.json" ]; then
            echo "No .sdd/state.json — state check skipped."; exit 0
          fi
          tier=$(jq -r '.tier // empty' .sdd/state.json)
          phase=$(jq -r '.phase // empty' .sdd/state.json)
          [ "$tier" = "0" ] && echo "Tier 0 — state check skipped." && exit 0
          if [ "$phase" != "done" ]; then
            echo "::error::.sdd/state.json phase is '$phase' (expected 'done'). Reset before creating a PR: {\"tier\": 0, \"phase\": \"done\", \"note\": \"no active feature\"}"
            exit 1
          fi
          echo "state.json phase=done — OK."

      - name: Spec gate
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed="$(git diff --name-only "$base"...HEAD)"
          # Exempt paths: docs, specs, .sdd, vendor (incl. submodule entries),
          # CI/tooling dirs (.claude/, .codex/, .github/), devcontainer, root dotfiles, and markdown.
          src="$(echo "$changed" | grep -vE '^(docs/|specs/|\.sdd/|vendor/|\.claude/|\.codex/|\.github/|\.devcontainer/|\.[^/]+$|.*\.md$)' || true)"

          labels='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q 'sdd:tier-0'; then
            echo "Tier 0 — spec gate skipped."; exit 0
          fi
          if [ -z "$src" ]; then
            echo "No source changes — spec gate skipped."; exit 0
          fi
          if ! ls specs/*/spec.md >/dev/null 2>&1; then
            echo "::error::Source changed but no specs/<feature>/spec.md found. Add a spec or label the PR 'sdd:tier-0'."
            exit 1
          fi
          echo "Spec present."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Run sdd-validate
        run: |
          if [ ! -f ".sdd/state.json" ]; then
            echo "No .sdd/state.json — sdd-validate skipped."
            exit 0
          fi
          bash integration/ci/sdd-validate.sh --root .

      - name: Tests
        run: |
          echo "TODO: replace with this project's test command"
          # e.g. npm test  /  pytest  /  go test ./...

  orchestration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Orchestration checks
        run: |
          # Skip if orchestration is not in use.
          if [ ! -f ".sdd/tasks.json" ]; then
            echo "No tasks.json — orchestration checks skipped."
            exit 0
          fi

          failed=0

          # No blocked tasks allowed on merge.
          blocked=$(jq '[.[] | select(.status=="blocked")] | length' .sdd/tasks.json)
          if [ "$blocked" -gt 0 ]; then
            echo "::error::$blocked blocked task(s) in .sdd/tasks.json. Resolve before merging."
            failed=$((failed + 1))
          fi

          # Every in_progress or pending implement task must have a handoff.md.
          while IFS= read -r id; do
            handoff="specs/$id/handoff.md"
            if [ ! -f "$handoff" ]; then
              echo "::error::Missing handoff.md for implement task '$id' (expected: $handoff)"
              failed=$((failed + 1))
            fi
          done < <(jq -r '.[] | select(.phase=="implement" and (.status=="in_progress" or .status=="pending")) | .id' .sdd/tasks.json)

          [ "$failed" -gt 0 ] && exit 1
          echo "Orchestration checks passed."
